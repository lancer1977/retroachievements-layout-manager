name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ra-layout-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate
        run: |
          chmod +x scripts/validate.sh
          ./scripts/validate.sh
